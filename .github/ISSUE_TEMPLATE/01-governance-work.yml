name: Bears governance work
description: Request bounded work for the Bears workflow-governance overlay.
title: "[Governance]: "
labels:
  - type:idea
body:
  - type: textarea
    id: agent_pickup_promotion_checklist
    attributes:
      label: agent pickup promotion checklist
      description: Default intake uses `type:idea`. Promotion to `type:develop-ready` requires the agent pickup fields below plus dry-run PASS. Do not include restricted data.
      value: "type:develop-ready promotion requires route gate, constitution evidence, research evidence, accepted operator decision evidence, owning role, task packet, duplicate guard, and verify-agent-pickup dry-run PASS."
    validations:
      required: false
  - type: input
    id: target_path
    attributes:
      label: Exact target path
      description: Name one repository path or file path that owns the requested change.
    validations:
      required: true
  - type: input
    id: concrete_part_or_role_route
    attributes:
      label: Concrete part or role route
      description: Name the exact platform part, workflow part, or specialist role route.
    validations:
      required: true
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem statement
      description: State the current fault or missing behavior in concrete terms.
    validations:
      required: true
  - type: dropdown
    id: pre_development_gate_impact
    attributes:
      label: Pre-development gate impact
      description: Select the earliest canonical lifecycle gate affected before implementation starts.
      options:
        - Route gate
        - Subagents-roles gate
        - Research gate
        - Prototype gate
        - Design gate
        - Spec Kit gate
        - Role gate
        - Subagent execution
        - Validation
        - Stage-boundary audit
    validations:
      required: true
  - type: dropdown
    id: research_reuse_decision
    attributes:
      label: Research or reuse decision
      description: Select the required research or existing-pattern decision.
      options:
        - Research required
        - Reuse existing Bears pattern
        - Research skip requested for narrow bounded work
        - Not applicable to this request
    validations:
      required: true
  - type: textarea
    id: route_gate_evidence
    attributes:
      label: Route gate evidence
      description: Provide status, target, concrete part or route result, and owning role or primary role.
      render: json
    validations:
      required: false
  - type: textarea
    id: constitution_evidence
    attributes:
      label: Constitution evidence
      description: Provide a structured evidence object with status, safe evidence path or source ref, and command/result or approved decision reason.
      render: json
    validations:
      required: false
  - type: textarea
    id: research_evidence
    attributes:
      label: Research evidence
      description: Provide a structured evidence object with status, safe evidence path or source ref, and command/result or approved skip reason.
      render: json
    validations:
      required: false
  - type: textarea
    id: accepted_operator_decision_evidence
    attributes:
      label: Accepted operator decision evidence
      description: Provide a structured evidence object with status, safe source ref, and decision reason.
      render: json
    validations:
      required: false
  - type: input
    id: owning_role
    attributes:
      label: Owning role
      description: Name the exact primary specialist role for the bounded implementation scope.
    validations:
      required: false
  - type: textarea
    id: task_packet
    attributes:
      label: Task packet
      description: Provide issue id, bounded target, allowed write/read surfaces, owning role, validation commands, and safety boundary.
      render: json
    validations:
      required: false
  - type: textarea
    id: duplicate_guard
    attributes:
      label: Duplicate guard
      description: Provide status, duplicates_found, repository, normalized scope key, search query or checked issues, checked_at, and evidence summary.
      render: json
    validations:
      required: false
  - type: textarea
    id: verify_agent_pickup_dry_run
    attributes:
      label: Verify agent pickup dry-run
      description: Provide status plus command/result/proof path for the agent pickup dry-run verification.
      render: json
    validations:
      required: false
  - type: textarea
    id: validation_command
    attributes:
      label: Validation command
      description: Provide the exact command that should prove the requested change.
      render: shell
    validations:
      required: true
  - type: checkboxes
    id: restricted_data_safety
    attributes:
      label: Restricted-data safety confirmation
      description: Confirm the issue body excludes restricted data.
      options:
        - label: I confirm this issue includes no secrets, tokens, private keys, raw env values, raw logs, credential files, production data, raw VPN configs, raw chat, or shell history.
          required: true
