name: Plugin CI/CD

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Plugin structure and cachebuster
    runs-on: ubuntu-latest
    outputs:
      gateway_sha256: ${{ steps.gateway-source.outputs.sha256 }}
    steps:
      - name: Check out the exact revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check plugin and marketplace structure
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import pathlib
          import re
          import sys

          def fail(message: str) -> None:
              print(f"::error title=Invalid plugin structure::{message}")
              raise SystemExit(1)

          root = pathlib.Path.cwd()
          manifest = json.loads((root / ".codex-plugin/plugin.json").read_text())
          marketplace = json.loads((root / ".agents/plugins/marketplace.json").read_text())
          name = "bears-app-based-workflow"
          if manifest.get("name") != name:
              fail("plugin manifest name is not bears-app-based-workflow")
          if not re.fullmatch(r"\d+\.\d+\.\d+\+codex\.\d{14}", manifest.get("version", "")):
              fail("plugin version must use the SemVer +codex.YYYYMMDDhhmmss cachebuster")
          entries = marketplace.get("plugins")
          if marketplace.get("name") != name or not isinstance(entries, list) or len(entries) != 1:
              fail("marketplace must contain exactly the fixed plugin entry")
          entry = entries[0]
          if entry.get("name") != name or entry.get("source") != {"source": "local", "path": "."}:
              fail("marketplace plugin identity or local source is not fixed")
          PY

      - name: Check cachebuster freshness
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${BASE_SHA:-}" =~ ^[0-9a-f]{40}$ ]] || [[ "$BASE_SHA" =~ ^0+$ ]] || ! git cat-file -e "$BASE_SHA^{commit}"; then
            echo "No comparable base commit; cachebuster format check is sufficient for this ref."
            exit 0
          fi
          mapfile -t changed < <(git diff --name-only "$BASE_SHA" "$GITHUB_SHA" -- \
            .codex-plugin agents skills scripts hooks assets .app.json .mcp.json AGENTS.md install)
          if ((${#changed[@]} == 0)); then
            echo "No deployable plugin files changed."
            exit 0
          fi
          base_version="$(git show "$BASE_SHA:.codex-plugin/plugin.json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["version"])')"
          head_version="$(python3 -c 'import json; print(json.load(open(".codex-plugin/plugin.json"))["version"])')"
          if [[ "$base_version" == "$head_version" ]]; then
            echo "::error title=Stale plugin cachebuster::Deployable plugin files changed but .codex-plugin/plugin.json version did not."
            exit 1
          fi

      - name: Dry-run the role installer in an isolated Codex home
        shell: bash
        run: |
          set -euo pipefail
          codex_home="$(mktemp -d "$RUNNER_TEMP/bears-plugin-codex-home.XXXXXX")"
          trap 'rm -rf "$codex_home"' EXIT
          CODEX_HOME="$codex_home" ./install --dry-run

      - name: Exercise deterministic fixed-gateway tests
        shell: bash
        run: python3 .github/runner/test_deploy_plugin_sentry.py

      - name: Record the exact reviewed gateway source digest
        id: gateway-source
        shell: bash
        run: |
          set -euo pipefail
          digest="$(sha256sum .github/runner/deploy_plugin.py | awk '{print $1}')"
          [[ "$digest" =~ ^[0-9a-f]{64}$ ]]
          printf 'sha256=%s\n' "$digest" >> "$GITHUB_OUTPUT"

      - name: Materialize the public automation status
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        shell: bash
        run: |
          python3 - <<'PY'
          import datetime
          import json
          import os
          import pathlib

          status = "passed" if os.environ["JOB_STATUS"] == "success" else "failed"
          artifact_name = f"automation-status-{os.environ['GITHUB_SHA']}-{os.environ['GITHUB_RUN_ATTEMPT']}"
          payload = {
              "schema": "automation-status.v1",
              "status": status,
              "commit": os.environ["GITHUB_SHA"],
              "timestamp": datetime.datetime.now(datetime.timezone.utc).isoformat(
                  timespec="seconds"
              ).replace("+00:00", "Z"),
              "evidence_ref": (
                  f"github-actions://{os.environ['GITHUB_REPOSITORY']}"
                  f"/runs/{os.environ['GITHUB_RUN_ID']}"
                  f"/attempts/{os.environ['GITHUB_RUN_ATTEMPT']}"
                  f"/artifacts/{artifact_name}"
              ),
          }
          target = pathlib.Path(os.environ["RUNNER_TEMP"]) / "automation-status.json"
          target.write_text(json.dumps(payload, sort_keys=True, separators=(",", ":")) + "\n")
          PY

      - name: Publish the public automation status
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: automation-status-${{ github.sha }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/automation-status.json
          if-no-files-found: error
          retention-days: 90
          compression-level: 0

  cd:
    name: Deploy exact main revision
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, x64, bears-plugin-cd]
    timeout-minutes: 15
    concurrency:
      group: bears-app-based-workflow-cd
      cancel-in-progress: false
    steps:
      - name: Check out the exact reviewed revision as non-executable data
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify and promote through the fixed root-owned gateway
        shell: bash
        working-directory: /
        env:
          REVIEWED_GATEWAY_SHA256: ${{ needs.ci.outputs.gateway_sha256 }}
        run: |
          set -euo pipefail
          gateway=/usr/local/sbin/deploy-bears-app-based-workflow
          reviewed='${{ github.workspace }}/.github/runner/deploy_plugin.py'
          [[ "$REVIEWED_GATEWAY_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ -f "$gateway" && ! -L "$gateway" ]]
          [[ "$(stat -c '%u' "$gateway")" == 0 ]]
          mode=$((8#$(stat -c '%a' "$gateway")))
          (( (mode & 8#022) == 0 ))
          for directory in /usr/local /usr/local/sbin; do
            [[ "$(stat -c '%u' "$directory")" == 0 ]]
            directory_mode=$((8#$(stat -c '%a' "$directory")))
            (( (directory_mode & 8#022) == 0 ))
          done
          [[ "$(sha256sum "$reviewed" | awk '{print $1}')" == "$REVIEWED_GATEWAY_SHA256" ]]
          [[ "$(sha256sum "$gateway" | awk '{print $1}')" == "$REVIEWED_GATEWAY_SHA256" ]]
          cmp -s -- "$reviewed" "$gateway"
          sudo -n -u ai1 -- "$gateway" '${{ github.sha }}'
