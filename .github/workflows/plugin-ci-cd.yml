name: Plugin CI/CD

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Requirements-driven autoCI
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      status: ${{ steps.evaluate.outputs.status }}
      duration_seconds: ${{ steps.evaluate.outputs.duration_seconds }}
      timeout_reason: ${{ steps.evaluate.outputs.timeout_reason }}
      gateway_sha256: ${{ steps.evaluate.outputs.gateway_sha256 }}
    steps:
      - name: Check out caller revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Check out immutable autoCI stack
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: BearsCLOUD/bears-codex-workspace
          ref: 62daa1ad09fb7306c95cd49c4e1f2a5d8969c54b
          path: .autoci-stack
          fetch-depth: 1
          persist-credentials: false

      - name: Run the single autoCI evaluator
        id: evaluate
        shell: bash
        run: >-
          timeout --signal=TERM --kill-after=1s 10s
          python3 .autoci-stack/.github/autoci/evaluate_plugin.py
          --root "$GITHUB_WORKSPACE"
          --requirements "$GITHUB_WORKSPACE/.github/autoci/ci-requirements.v1.json"
          --output-dir "$RUNNER_TEMP/plugin-autoci"

      - name: Publish immutable autoCI evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: plugin-autoci-${{ github.sha }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/plugin-autoci
          if-no-files-found: error
          retention-days: 90
          compression-level: 0

  cd:
    name: Deploy exact main revision
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, x64, bears-plugin-cd]
    timeout-minutes: 15
    concurrency:
      group: bears-app-based-workflow-cd
      cancel-in-progress: false
    steps:
      - name: Check out the exact reviewed revision as non-executable data
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify and promote through the fixed root-owned gateway
        shell: bash
        working-directory: /
        env:
          REVIEWED_GATEWAY_SHA256: ${{ needs.ci.outputs.gateway_sha256 }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gateway=/usr/local/sbin/deploy-bears-app-based-workflow
          reviewed='${{ github.workspace }}/.github/runner/deploy_plugin.py'
          [[ "$REVIEWED_GATEWAY_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ -f "$gateway" && ! -L "$gateway" ]]
          [[ "$(stat -c '%u' "$gateway")" == 0 ]]
          mode=$((8#$(stat -c '%a' "$gateway")))
          (( (mode & 8#022) == 0 ))
          for directory in /usr/local /usr/local/sbin; do
            [[ "$(stat -c '%u' "$directory")" == 0 ]]
            directory_mode=$((8#$(stat -c '%a' "$directory")))
            (( (directory_mode & 8#022) == 0 ))
          done
          [[ "$(sha256sum "$reviewed" | awk '{print $1}')" == "$REVIEWED_GATEWAY_SHA256" ]]
          [[ "$(sha256sum "$gateway" | awk '{print $1}')" == "$REVIEWED_GATEWAY_SHA256" ]]
          cmp -s -- "$reviewed" "$gateway"
          printf '%s\n' "$GH_TOKEN" | sudo -n -u ai1 -- "$gateway" '${{ github.sha }}'
