name: Plugin Marketplace CD

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  update-marketplace:
    name: Update installed plugin from marketplace
    runs-on: [self-hosted, linux, x64, bears-plugin-cd]
    timeout-minutes: 15
    concurrency:
      group: bears-app-based-workflow-cd
      cancel-in-progress: false
    steps:
      - name: Update gateway and promote the exact pushed revision
        shell: bash
        working-directory: /
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          promoter=/usr/local/sbin/promote-bears-app-based-workflow
          [[ -f "$promoter" && ! -L "$promoter" ]]
          [[ "$(stat -c '%U:%G' "$promoter")" == root:root ]]
          mode=$((8#$(stat -c '%a' "$promoter")))
          (( (mode & 8#022) == 0 ))
          printf '%s\n' "$GH_TOKEN" | sudo -n -- "$promoter" '${{ github.sha }}'
