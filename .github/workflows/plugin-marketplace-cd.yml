name: Plugin Marketplace CD

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  update-marketplace:
    name: Update installed plugin from marketplace
    runs-on: [self-hosted, linux, x64, bears-plugin-cd]
    timeout-minutes: 15
    concurrency:
      group: bears-app-based-workflow-cd
      cancel-in-progress: false
    steps:
      - name: Checkout exact pushed revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.sha }}
          set-safe-directory: false
          sparse-checkout: .github/runner

      - name: Verify deployment recovery
        shell: bash
        timeout-minutes: 2
        run: |
          set -euo pipefail
          /usr/bin/env -i HOME="$RUNNER_TEMP" PATH=/usr/bin:/bin LANG=C.UTF-8 \
            /usr/bin/python3 -B .github/runner/test_graph_instruction_retirement.py --verbose

      - name: Update gateway and promote the exact pushed revision
        shell: bash
        working-directory: /
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          promoter=/usr/local/sbin/promote-bears-app-based-workflow
          [[ -f "$promoter" && ! -L "$promoter" ]]
          [[ "$(stat -c '%U:%G' "$promoter")" == root:root ]]
          mode=$((8#$(stat -c '%a' "$promoter")))
          (( (mode & 8#022) == 0 ))
          cmp -s "$promoter" "$GITHUB_WORKSPACE/.github/runner/promote_gateway.py" || {
            printf '%s\n' 'root promoter bootstrap is required before this receipt-v5 rollout' >&2
            exit 1
          }
          printf '%s\n' "$GH_TOKEN" | sudo -n -- "$promoter" '${{ github.sha }}'
