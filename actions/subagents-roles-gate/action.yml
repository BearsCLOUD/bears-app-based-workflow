name: Bears subagents roles gate
description: "Runs Bears role-gate checks from the private action checkout. Caller workflows need permissions: contents: read and no secrets."
inputs:
  platform-repo-root:
    description: Caller checkout path. Relative values resolve from github.workspace and must stay under it.
    required: false
    default: .
  platform-route-root:
    description: Canonical Bears platform route root used for role catalog matching.
    required: false
    default: /srv/bears/dev/platform
  role-targets:
    description: Newline-separated Bears platform target paths relative to platform-route-root.
    required: false
    default: |-
      tests/test_gateway_runtime_contracts.py
      docs/ci/gateway-required-checks.md
  require-target-files:
    description: Require each relative role target to exist under platform-repo-root.
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Validate role catalog and platform routes
      shell: bash
      env:
        BEARS_PLUGIN_ACTION_PATH: ${{ github.action_path }}
        BEARS_PLATFORM_REPO_ROOT: ${{ inputs.platform-repo-root }}
        BEARS_PLATFORM_ROUTE_ROOT: ${{ inputs.platform-route-root }}
        BEARS_PLATFORM_ROLE_TARGETS: ${{ inputs.role-targets }}
        BEARS_REQUIRE_TARGET_FILES: ${{ inputs.require-target-files }}
      run: |
        set -euo pipefail

        action_root="${BEARS_PLUGIN_ACTION_PATH}"
        plugin_root="$(cd "${action_root}/../.." && pwd -P)"
        platform_repo_root="${BEARS_PLATFORM_REPO_ROOT}"
        platform_route_root="${BEARS_PLATFORM_ROUTE_ROOT%/}"

        if [[ -z "${GITHUB_WORKSPACE:-}" ]]; then
          echo "GITHUB_WORKSPACE is required." >&2
          exit 1
        fi

        workspace_root="$(python3 - "${GITHUB_WORKSPACE}" <<'PY'
        import os
        import sys
        print(os.path.realpath(sys.argv[1]))
        PY
        )"

        if [[ "${platform_repo_root}" != /* ]]; then
          platform_repo_root="${workspace_root}/${platform_repo_root}"
        fi
        platform_repo_root="$(python3 - "${platform_repo_root}" <<'PY'
        import os
        import sys
        print(os.path.realpath(sys.argv[1]))
        PY
        )"

        python3 - "${workspace_root}" "${platform_repo_root}" <<'PY'
        import os
        import sys
        workspace_root, platform_repo_root = sys.argv[1:3]
        if os.path.commonpath([workspace_root, platform_repo_root]) != workspace_root:
            print(
                f"platform-repo-root must stay under GITHUB_WORKSPACE: {platform_repo_root}",
                file=sys.stderr,
            )
            sys.exit(1)
        PY

        if [[ ! -d "${action_root}" ]]; then
          echo "Bears plugin action path is missing: ${action_root}" >&2
          exit 1
        fi
        if [[ ! -f "${plugin_root}/scripts/subagents_roles.py" ]]; then
          echo "Bears plugin scripts are missing under action repository root: ${plugin_root}" >&2
          exit 1
        fi
        if [[ ! -d "${platform_repo_root}" ]]; then
          echo "Bears platform checkout path is missing: ${platform_repo_root}" >&2
          exit 1
        fi

        python3 "${plugin_root}/scripts/subagents_roles.py" validate
        python3 "${plugin_root}/scripts/role_gate_methodology.py" validate

        case "${BEARS_REQUIRE_TARGET_FILES}" in
          true|false) ;;
          *)
            echo "require-target-files must be true or false." >&2
            exit 1
            ;;
        esac

        while IFS= read -r target || [[ -n "${target}" ]]; do
          target="${target//$'\r'/}"
          target="${target#"${target%%[![:space:]]*}"}"
          target="${target%"${target##*[![:space:]]}"}"
          if [[ -z "${target}" || "${target}" == \#* ]]; then
            continue
          fi

          if [[ "${target}" == /* || "${target}" == *".."* ]]; then
            echo "role-targets entries must be relative paths without '..': ${target}" >&2
            exit 1
          fi

          route_target="${platform_route_root}/${target}"
          if [[ "${BEARS_REQUIRE_TARGET_FILES}" == "true" && ! -e "${platform_repo_root}/${target}" ]]; then
            echo "Bears platform target is missing in caller checkout: ${platform_repo_root}/${target}" >&2
            exit 1
          fi

          python3 "${plugin_root}/scripts/subagents_roles.py" route "${route_target}"
          python3 "${plugin_root}/scripts/subagents_roles.py" audit "${route_target}"
        done <<< "${BEARS_PLATFORM_ROLE_TARGETS}"
