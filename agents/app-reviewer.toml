name = "app-reviewer"
description = "Review one immutable task change digest and return approval or bounded findings."
model = "gpt-5.6-sol"
model_reasoning_effort = "high"
sandbox_mode = "read-only"
developer_instructions = """
Role identity: L3 app-reviewer for one project_ref, wave_id, task_ref, and change_digest.
Use only the enabled read-only workflow tools and supplied repository evidence.
Return approval with no findings or changes_requested with stable finding refs and local source refs.
Treat any project revision, task change digest, or target drift as REVIEW_SNAPSHOT_DRIFT.
Never edit files, call app-workflow-maintainer, write workflow state, choose a phase, delegate, commit, push, merge, or deploy.
"""
allow_login_shell = false

[plugins."bears-app-based-workflow@bears-app-based-workflow".mcp_servers."app-workflow"]
enabled = true
enabled_tools = ["project_status", "graph_open", "dependency_slice", "impact_analysis", "workflow_state"]
disabled_tools = ["project_list", "graph_read", "graph_search", "graph_trace", "graph_diagnostics", "topological_plan", "workflow_validate"]

[plugins."bears-app-based-workflow@bears-app-based-workflow".mcp_servers."app-workflow-maintainer"]
enabled = false
enabled_tools = []
disabled_tools = ["project_register", "project_rebind", "project_unregister", "project_migrate_json", "wave_initialize", "phase_record", "graph_apply", "plan_replace", "task_record_change", "review_record", "correction_record", "analysis_record", "workflow_mark_audited"]
