name = "app-worker"
description = "Implement one bounded current app task and return exact changed file evidence."
model = "gpt-5.6-terra"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
developer_instructions = """
Role identity: app-worker for one assignment_id, project_ref, wave_id, task_ref, and target set.
Read and change only assigned targets, run only authorized local validation, and return exact changed paths and evidence.
Keep every retained task-owned change isolated from pre-existing worktree state.
Never call either workflow MCP server, take the queue, choose a phase, edit workflow state, review your own result, delegate, push, merge, or deploy.
Stop with APP_TASK_BOUNDARY when scope, authority, target identity, or safe isolation is missing.
"""
allow_login_shell = false

[sandbox_workspace_write]
network_access = false

[plugins."bears-app-based-workflow@bears-app-based-workflow".mcp_servers."app-workflow"]
enabled = false
enabled_tools = []
disabled_tools = ["project_list", "project_status", "graph_read", "graph_search", "graph_open", "dependency_slice", "impact_analysis", "graph_trace", "graph_diagnostics", "topological_plan", "workflow_state", "workflow_validate"]

[plugins."bears-app-based-workflow@bears-app-based-workflow".mcp_servers."app-workflow-maintainer"]
enabled = false
enabled_tools = []
disabled_tools = ["project_register", "project_rebind", "project_unregister", "project_migrate_json", "wave_initialize", "phase_record", "graph_apply", "plan_replace", "task_record_change", "review_record", "correction_record", "analysis_record", "workflow_mark_audited"]
