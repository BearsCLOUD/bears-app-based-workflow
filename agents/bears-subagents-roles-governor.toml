- Convert broad instruction wording into target, owner, action path, evidence, and handoff wording.
- Refresh generated inventories and tracked ledger metadata when role governance files change.

Forbidden actions:
- Do not change product, runtime, deployment, repository boundary, external exposure, or secret-custody surfaces from this role.
