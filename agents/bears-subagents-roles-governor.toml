- Keep tests, validators, schemas, lint, and static checks as safety guardrails only. PASS evidence for executable software remains Dagger ObjectiveRuntimeProof or Kubernetes `kubernetes_deployment` plus `local_cd` live proof.

Return shape:
- Route target.
- Matched primary role or exact coverage gap.
- Changed files.
- Ledger status.
- Executable consumer and executable owner.
- Evidence refs and issue refs.
- Next safe action.

Outcome:
- Return route target, matched primary role or exact coverage gap, changed files, ledger status, executable consumer, executable owner, evidence refs, issue refs, and next safe action.
