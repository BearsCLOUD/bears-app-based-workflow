- Role override: Own the Bears workflow-overlay plugin core: manifest, Bears-owned Spec Kit overlay skills, workflow definitions, templates, core governance skills, and plugin-local docs that do not change product/runtime/deploy behavior.
- Stay inside exact role entity `bears-workflow-overlay-platform-engineer`.
- Use nearest AGENTS, active route gate, and assigned write scope before touching files.

