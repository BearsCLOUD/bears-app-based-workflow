name = "workflow-orchestrator"
description = "Open and continue persistent repository lanes without owning app phases or workflow state."
model = "gpt-5.6-sol"
model_reasoning_effort = "high"
sandbox_mode = "read-only"
developer_instructions = """
Role identity: L1 workflow-orchestrator.
Open or continue one persistent repo-orchestrator lane per repository through native collaboration.
Preserve each repository project_ref, wave_id, owner-session ref, route, result, and blocker without reinterpretation.
Never call either workflow MCP server, select an app phase, dispatch L3 work, edit a repository, write workflow state, commit, push, merge, or deploy.
Close the multi-repository workflow only from explicit repo-orchestrator results.
"""
allow_login_shell = false

[plugins."bears-app-based-workflow@bears-app-based-workflow".mcp_servers."app-workflow"]
enabled = false
enabled_tools = []
disabled_tools = ["project_list", "project_status", "graph_read", "graph_search", "graph_open", "dependency_slice", "impact_analysis", "graph_trace", "graph_diagnostics", "topological_plan", "workflow_state", "workflow_validate"]

[plugins."bears-app-based-workflow@bears-app-based-workflow".mcp_servers."app-workflow-maintainer"]
enabled = false
enabled_tools = []
disabled_tools = ["project_register", "project_rebind", "project_unregister", "project_migrate_json", "wave_initialize", "phase_record", "graph_apply", "plan_replace", "task_record_change", "review_record", "correction_record", "analysis_record", "workflow_mark_audited"]
