schema_version: '1.0'
workflow:
  id: agent-github-dev-cd
  name: Bears Agent GitHub Dev CD
  version: 0.5.0
  author: Bears Workspace
  description: Archived non-authoritative reference for the former agent GitHub dev-CD flow. Active Bears plugin delivery is main-only through agentic-enterprise delivery_policy.
requires:
  plugin: bears
  catalog: assets/catalog/agent-github-dev-cd.v1.json
  validator: scripts/agent_github_dev_cd.py validate
  merge_authority_validator: scripts/agent_github_dev_cd.py merge-authority-check --packet <path> --expected-repository <owner/repo> --expected-pr-number <number> --expected-head-ref <head-ref> --expected-head-sha <head-sha> --expected-base-ref <base-ref>
  roles:
  - bears-deploy-platform-engineer
  - bears-platform-security-reviewer
  dev_deploy_source_of_truth: /srv/bears/kubernetes (historical reference only)
  dispatch_artifact: artifacts/dev-cd-dispatch-gate.json (historical reference only)
  scenario_policy_validator: scripts/agent_github_dev_cd.py verify-scenario-policy --packet <path>
  dev_auto_merge_validator: 'python3 scripts/agent_github_dev_cd.py verify-dev-auto-merge --packet <path> --expected-repository <owner/repo> --expected-pr-number <number> --expected-head-ref <head-ref> --expected-head-sha <head-sha> --expected-base-ref dev # deprecated: always blocks under main-only delivery'
inputs:
  goal_id:
    type: string
    required: true
  roadmap_id:
    type: string
    required: true
  workflow_mode:
    type: string
    default: sequential
    allowed:
    - sequential
    - parallel
  dev_cd:
    type: boolean
    default: false
  issue_packet:
    type: string
    required: false
  agent_pickup:
    type: boolean
    default: false
  development_scenario:
    type: string
    default: goal
    allowed:
    - dev
    - prod
    - bugfix
    - hot_bugfix
    - issue
    - goal
branches:
  main: main
  dev: dev
  goal: goal/<goal-id>
  agent: agent/<goal-id>/<role>/<slice-id>
workflow_modes:
  default_mode: sequential
  allowed_modes:
  - sequential
  - parallel
  sequential:
    goal_branch_required: true
    agent_branches_required: false
    goal_to_dev_pr_allowed: true
    direct_main_pr_allowed: false
    stacked_branches_allowed_only_with_recorded_policy: true
  parallel:
    goal_branch_required: true
    agent_branches_required: true
    agent_pr_target: goal/<goal-id>
    goal_pr_target_for_dev: dev
  mode_transition_rules:
    sequential_to_parallel_requires_recorded_transition: true
    parallel_to_sequential_blocked_while_agent_prs_open: true
issue_type_flow:
  policy:
    issue_identifiers:
      bugfix: type:bugfix
      idea: type:idea
      develop_ready: type:develop-ready
    develop_ready:
      identifier: type:develop-ready
      produced_by:
      - repository_constitution_alignment
      - research
      - accepted_operator_decision
      required_evidence:
      - constitution_alignment
      - research
      - accepted_operator_decision
      required_body_fields:
      - concrete_problem
      - exact_targets_surfaces
      - required_change
      - acceptance_criteria
      - validation_commands
      - duplicate_guard
      - safety_boundary
      body_field_headings:
        concrete_problem: Concrete problem
        exact_targets_surfaces: Exact targets/surfaces
        required_change: Required change
        acceptance_criteria: Acceptance criteria
        validation_commands: Validation commands
        duplicate_guard: Duplicate guard
        safety_boundary: Safety boundary
      empty_or_vague_body_fails_closed: true
      comments_do_not_substitute_body_fields: true
    type_label_guard:
      fixed_type_labels:
      - type:bugfix
      - type:idea
      - type:develop-ready
      open_governance_issue_exactly_one_type_label_required: true
      api_and_automation_created_issues_in_scope: true
      body_text_must_not_promote_to_type_develop_ready: true
      zero_or_multiple_type_labels_fail_closed: true
      verify_command: python3 scripts/agent_github_dev_cd.py verify-issue-metadata --issue-packet <path>
      packet_schema: bears-agent-github-dev-cd-issue-metadata.v1
    agent_pickup:
      actor: local_agent_runner
      allowed_issue_type: type:develop-ready
      starts_bounded_development_without_user_goal_run: true
      blocked_when_unlabeled: true
      blocked_issue_types:
      - type:idea
      blocked_labels:
      - type:idea
      - blocked
      - needs-human
      - needs-design
      - security
      - security-review
      - secret
      - credentials
      - deploy
      - production
      - manual-only
      - agent:blocked
      bugfix_only_blocked: true
      required_pre_dispatch_gates:
      - route_gate
      - constitution_evidence
      - research_evidence
      - accepted_operator_decision_evidence
      - owning_role
      - task_packet
      - duplicate_guard
      - dry_run
      structured_evidence_required:
        route_gate:
        - status
        - target
        - concrete_part_or_route_result
        - owning_role_or_primary_role
        evidence_objects:
        - status
        - evidence_path_or_source_ref
        - result_or_decision
        task_packet:
        - issue
        - bounded_target
        - allowed_write_surfaces
        - allowed_read_surfaces
        - owning_role
        - validation_commands
        - safety_boundary
        duplicate_guard:
        - status
        - duplicates_found
        - repository
        - normalized_scope_key
        - search_query_or_checked_issues
        - checked_at
        - evidence_summary
        dry_run:
        - status
        - command
        - result_or_proof_path
      dry_run_required_before_dispatch: true
      dispatch_allowed_after_dry_run: true
    issue_template:
      path: .github/ISSUE_TEMPLATE/01-governance-work.yml
      default_label: type:idea
      promotion_label: type:develop-ready
      required_develop_ready_field_ids:
      - agent_pickup_promotion_checklist
      - route_gate_evidence
      - constitution_evidence
      - research_evidence
      - accepted_operator_decision_evidence
      - owning_role
      - task_packet
      - duplicate_guard
      - verify_agent_pickup_dry_run
      canonical_gate_options:
      - Route gate
      - Subagents-roles gate
      - Research gate
      - Prototype gate
      - Design gate
      - Spec Kit gate
      - Role gate
      - Subagent execution
      - Validation
      - Stage-boundary audit
      blank_issues_allowed: false
  verify_command: python3 scripts/agent_github_dev_cd.py verify-agent-pickup --issue-packet <path> --dry-run
  metadata_verify_command: python3 scripts/agent_github_dev_cd.py verify-issue-metadata --issue-packet <path>
sequential_steps:
- goal-branch
- classify-task
- classify-mode
- verify-scenario-policy
- branch-enforcement
- main-only-delivery
parallel_steps:
- goal-branch
- classify-task
- classify-mode
- verify-scenario-policy
- branch-enforcement
- agent-branches
- agent-draft-prs
- main-only-delivery
steps:
- id: issue-metadata-gate
  action: verify-issue-metadata
  command: python3 scripts/agent_github_dev_cd.py verify-issue-metadata --issue-packet <path>
  mode: open-governance-issue-metadata
  fixed_type_labels:
  - type:bugfix
  - type:idea
  - type:develop-ready
  requires:
  - exactly_one_fixed_type_label
  - develop_ready_body_fields
- id: agent-pickup-gate
  action: verify-agent-pickup
  command: python3 scripts/agent_github_dev_cd.py verify-agent-pickup --issue-packet <path> --dry-run
  actor: local_agent_runner
  mode: issue-type-pickup
  allowed_issue_type: type:develop-ready
  blocked_labels:
  - type:idea
  - blocked
  - needs-human
  - needs-design
  - security
  - security-review
  - secret
  - credentials
  - deploy
  - production
  - manual-only
  - agent:blocked
  requires:
  - route_gate
  - constitution_evidence
  - research_evidence
  - accepted_operator_decision_evidence
  - owning_role
  - task_packet
  - duplicate_guard
  - dry_run
  dispatch_allowed_after_dry_run: true
- id: goal-branch
  action: create-or-reuse-remote-branch
  branch: goal/<goal-id>
  source: dev
- id: classify-task
  action: classify-task
  command: python3 scripts/agent_github_dev_cd.py classify-task --prompt-file <path>
  produces: development_scenario tasks
- id: classify-mode
  action: classify-workflow-mode
  command: python3 scripts/agent_github_dev_cd.py classify-mode --goal-id <goal-id> --declared-mode <workflow-mode> --development-scenario <development-scenario> [--topology-file <path>]
- id: verify-scenario-policy
  action: verify-scenario-policy
  command: python3 scripts/agent_github_dev_cd.py verify-scenario-policy --packet <path>
  requires:
  - development_scenario
  - typed merge packet when merge is requested
- id: branch-enforcement
  action: enforce-workflow-mode-branches
  requires:
  - classify-mode
  rules:
  - sequential requires goal/<goal-id> and allows goal/<goal-id> -> dev without agent branches
  - sequential rejects agent branches unless recorded transition evidence exists
  - sequential allows stacked branches only with recorded stack policy
  - parallel requires agent/<goal-id>/<role>/<slice-id> -> goal/<goal-id> -> dev
  - main is not a normal auto-merge target
- id: agent-branches
  action: create-remote-branch-per-agent
  branch: agent/<goal-id>/<role>/<slice-id>
  target: goal/<goal-id>
  mode: parallel
- id: agent-draft-prs
  action: open-draft-pr
  from: agent/<goal-id>/<role>/<slice-id>
  to: goal/<goal-id>
  mode: parallel
- id: state-file-gate-agent-pr
  action: verify-state-file-gate
  parent_context_allowed: false
  requires:
  - workflow_state
  - merge_authority_state
  - state_file_policy pass
  - authoritative_state_source machine_readable_state_files
  - non_state_authority_allowed false
  mode: parallel
- id: merge-authority-agent-pr
  action: verify-merge-authority
  command: python3 scripts/agent_github_dev_cd.py merge-authority-check --packet <path> --expected-repository <owner/repo> --expected-pr-number <number> --expected-head-ref <head-ref> --expected-head-sha <head-sha> --expected-base-ref <base-ref>
  parent_send_input_authority_allowed: false
  mode: parallel
  requires:
  - pre_task_hook
  - assignment_packet
  - exact PR number
  - exact head_ref
  - exact head_sha
  - green checks or named no-CI exception/operator override
  - state-file gate
  - title validation before ready
  - title validation before merge
  - draft false before merge
  - rollback note
  - operator_request or contract_authority
- id: merge-agent-pr
  action: merge-after-green-ci-and-state-file-gate
  to: goal/<goal-id>
  mode: parallel
  requires:
  - merge-authority-agent-pr
- id: goal-to-dev-pr
  action: open-pr
  from: goal/<goal-id>
  to: dev
  mode: sequential-and-parallel
- id: state-file-gate-goal-pr
  action: verify-state-file-gate
  parent_context_allowed: false
  requires:
  - workflow_state
  - merge_authority_state
  - state_file_policy pass
  - authoritative_state_source machine_readable_state_files
  - non_state_authority_allowed false
- id: verify-live-topology
  action: verify-live-topology
  command: python3 scripts/agent_github_dev_cd.py verify-live-topology --goal-id <goal-id> --declared-mode <workflow-mode> --development-scenario <development-scenario> [--topology-file <path>]
  requires:
  - state-file-gate-goal-pr
- id: merge-authority-dev-pr
  action: verify-merge-authority
  command: python3 scripts/agent_github_dev_cd.py merge-authority-check --packet <path> --expected-repository <owner/repo> --expected-pr-number <number> --expected-head-ref <head-ref> --expected-head-sha <head-sha> --expected-base-ref <base-ref>
  parent_send_input_authority_allowed: false
  requires:
  - pre_task_hook
  - assignment_packet
  - exact PR number
  - exact head_ref
  - exact head_sha
  - green checks or named no-CI exception/operator override
  - state-file gate
  - verify-live-topology
  - title validation before ready
  - title validation before merge
  - draft false before merge
  - rollback note
  - operator_request or contract_authority
- id: main-only-delivery
  name: Reference main-only delivery policy
  action: reference-main-only-delivery-policy
  authority: assets/catalog/agentic-enterprise-workflow.v1.json delivery_policy
  active_dev_cd_authority: false
  github_actions_dev_cd_gate_allowed: false
closeout:
  production_deploy_allowed: false
  main_requires_state_authority: true
scenario_policy:
  schema: bears-agent-github-dev-cd-scenario-policy.v1
  classifier:
    schema: bears-agent-github-dev-cd-task-classification.v1
    command: python3 scripts/agent_github_dev_cd.py classify-task --prompt-file <path>
    development_scenarios:
    - dev
    - prod
    - bugfix
    - hot_bugfix
    - issue
    - goal
    markers:
      dev:
      - dev
      - development
      prod:
      - prod
      - production
      bugfix:
      - bugfix
      - bug
      - fix
      hot_bugfix:
      - hot bugfix
      - hotfix
      - hot-fix
      - hot fix
      issue:
      - issue
      - '#<number>'
      goal:
      - /goal
    conflicting_markers_create_separate_tasks: true
    separate_subagent_per_task_required: false
    no_marker_status: needs_scenario_marker
  runtime:
    agent_current_runtime: /srv/bears
    production_branch: main
    development_branch: dev
    plugin_root_production_mutation_allowed: false
    production_mutation_authority: external_emergency_authority_only
  defaults:
    auto_merge_to_main_allowed: false
    plugin_root_production_mutation_allowed: false
  verify_command: python3 scripts/agent_github_dev_cd.py verify-scenario-policy --packet <path>
  scenarios:
    dev:
      merge_sequence:
      - work_branch
      - main
      target_branch: main
      runtime_target: main_only_delivery
      auto_cd_allowed: false
      auto_merge_to_main_allowed: false
      main_merge_actor: operator_direct_main_commit
      plugin_root_production_mutation_allowed: false
      required_gates:
      - delivery_complete
    prod:
      merge_sequence:
      - work_branch
      - main
      target_branch: main
      runtime_target: ci_cd
      auto_cd_allowed: false
      auto_merge_to_main_allowed: false
      main_merge_actor: operator_direct_main_commit
      plugin_root_production_mutation_allowed: false
      required_gates:
      - delivery_complete
    bugfix:
      merge_sequence:
      - work_branch
      - main
      target_branch: main
      runtime_target: ci_cd
      auto_cd_allowed: false
      auto_merge_to_main_allowed: false
      auto_merge_to_main_requires: []
      main_merge_actor: operator_direct_main_commit
      plugin_root_production_mutation_allowed: false
      required_gates:
      - delivery_complete
    hot_bugfix:
      merge_sequence:
      - external_emergency_task
      - git_backfill
      - main
      target_branch: emergency_then_git
      runtime_target: external_emergency_authority
      auto_cd_allowed: false
      auto_merge_to_main_allowed: false
      emergency_task_first_required: true
      git_backfill_required: true
      external_emergency_authority_required: true
      plugin_root_production_mutation_allowed: false
      required_gates:
      - external_emergency_authority
      - git_backfill_packet
      - delivery_complete
    issue:
      merge_sequence:
      - issue_metadata_gate
      - agent_pickup_gate
      - bounded_task
      target_branch: issue_selected
      runtime_target: agent_current_runtime
      auto_cd_allowed: false
      auto_merge_to_main_allowed: false
      plugin_root_production_mutation_allowed: false
      required_gates:
      - verify_issue_metadata
      - verify_agent_pickup
    goal:
      merge_sequence:
      - roadmap_control
      - tasks
      - scenario_reclassify
      target_branch: goal/<goal-id>
      runtime_target: roadmap_control
      auto_cd_allowed: false
      auto_merge_to_main_allowed: false
      plugin_root_production_mutation_allowed: false
      required_gates:
      - roadmap_control
archive_policy:
  status: deprecated_reference_only
  active_authority: false
  replacement_authority: assets/catalog/agentic-enterprise-workflow.v1.json delivery_policy
  main_only_delivery_required: true
  github_actions_dev_cd_gate_allowed: false
