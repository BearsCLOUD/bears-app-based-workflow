schema_version: "1.0"
workflow:
  id: "bears-sdd"
  name: "Bears Spec Kit Full Cycle"
  version: "0.1.0"
  author: "Bears Workspace"
  description: "Runs route gate → subagents-roles gate → research → prototype gate → design gate → Spec Kit gate → role gate → task-scoped subagents → validation → stage-boundary audit for Bears projects."

requires:
  speckit_version: ">=0.8.13"
  integrations:
    any:
      - "codex"
      - "claude"
      - "copilot"
      - "gemini"
      - "opencode"

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe the feature or workflow to build"
  integration:
    type: string
    default: "auto"
    prompt: "Integration name; auto selects the initialized project integration"
  research:
    type: string
    default: "standard"
    enum: ["skip", "standard", "deep"]
  research_skip_evidence:
    type: string
    required: true
    prompt: "Required when research=skip; cite existing Bears evidence or a narrow bugfix skip."
  scope:
    type: string
    default: "full"
    enum: ["full", "docs-only", "backend-only", "frontend-only", "runtime-only"]

steps:
  - id: route-gate
    command: bears.governance.check
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }} --scope={{ inputs.scope }}"

  - id: constitution-gate
    type: gate
    message: "Inspect assets/catalog/platform-role-catalog.v1.json before research; reject missing packet fields or invalid status."
    options: [approve, reject]
    on_reject: abort

  - id: research
    command: speckit.bears.research
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }} --depth={{ inputs.research }} --scope={{ inputs.scope }} --skip-evidence={{ inputs.research_skip_evidence }}"

  - id: prototype-gate
    type: gate
    message: "Confirm prototype.md or spike.md exists when research leaves cheap high-risk uncertainty; otherwise approve the documented skip."
    options: [approve, reject]
    on_reject: abort

  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: checklist
    command: speckit.checklist
    integration: "{{ inputs.integration }}"
    input:
      args: "requirements readiness for {{ inputs.spec }}"

  - id: review-spec
    type: gate
    message: "Inspect the research, spec, and requirements checklist before planning."
    options: [approve, reject]
    on_reject: abort

  - id: design-artifact-gate
    type: gate
    message: "Confirm design.md exists or an approved narrow bugfix skip validates before plan, tasks, analyze, role gate, or implementation."
    options: [approve, reject]
    on_reject: abort

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-plan
    type: gate
    message: "Review the plan before generating tasks."
    options: [approve, reject]
    on_reject: abort

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: analyze
    command: speckit.analyze
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: spec-kit-gate
    type: gate
    message: "Confirm spec.md, plan.md, tasks.md, and speckit-analyze PASS before mutation."
    options: [approve, reject]
    on_reject: abort

  - id: role-gate
    command: bears.role.gate
    integration: "{{ inputs.integration }}"
    input:
      args: "bind tasks.md items to the exact route and specialist role for {{ inputs.spec }}"

  - id: review-drift
    type: gate
    message: "Inspect role binding, analyze output, checklist gaps, and drift before implementation."
    options: [approve, reject]
    on_reject: abort

  - id: subagent-execution
    type: gate
    message: "Assign concrete tasks.md items to exact-role subagents; [P] tasks MUST delegate in parallel when scopes are disjoint."
    options: [approve, reject]
    on_reject: abort

  - id: bounded-delegated-execution
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }} --bounded delegated execution --approved tasks.md --parent-no-implementation"

  - id: validation
    command: bears.workflow.validate
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }} --require-artifacts"

  - id: stage-boundary-audit
    type: gate
    message: "Require plugin-fit, drift, documentation/restricted-data safety, and user-information capture audits once at the stage boundary."
    options: [approve, reject]
    on_reject: abort
